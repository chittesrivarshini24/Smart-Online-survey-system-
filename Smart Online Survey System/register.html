<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Survey</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-split">
    <div class="auth-visual">
        <div style="color:white;text-align:center;z-index:1;">
            <h1 style="font-size:3rem;">Join SmartSurvey</h1>
            <p>Start creating professional forms in minutes.</p>
        </div>
    </div>

    <div class="auth-form-area">
        <div class="auth-form">
            <h2>Create Account</h2>

            <p style="color:var(--text-muted);margin-bottom:2rem;">
                Join thousands of professional researchers.
            </p>

            <form id="registerForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:1rem;">
                    Register
                </button>
            </form>

            <p style="margin-top:1.5rem;text-align:center;">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>
    </div>
</div>

<script type="module" src="css/js/auth.js"></script>

</body>
</html>
