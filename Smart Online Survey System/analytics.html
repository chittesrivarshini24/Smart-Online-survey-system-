<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - SmartSurvey</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="app-container">

    <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-brand">
            <i class="fas fa-chart-line"></i> SmartSurvey
        </a>

        <a href="dashboard.html" class="nav-item">
            <i class="fas fa-home"></i> Dashboard
        </a>

        <a href="analytics.html" class="nav-item active">
            <i class="fas fa-chart-pie"></i> Analytics
        </a>

        <div style="margin-top:auto;">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-arrow-left"></i> Back
            </a>
        </div>
    </aside>

    <main class="main-content">

        <h1 style="font-size:42px;color:#6366f1;margin-bottom:30px;">
            📊 Analytics Overview
        </h1>

        <div class="survey-grid" style="grid-template-columns: repeat(auto-fit,minmax(220px,1fr));">

            <div class="stat-card">
                <p style="color:var(--text-muted);">Total Responses</p>
                <h2 id="total">0</h2>
            </div>

            <div class="stat-card">
                <p style="color:#6366f1;">Student</p>
                <h2 id="s_count">0</h2>
            </div>

            <div class="stat-card">
                <p style="color:#a855f7;">Hospital</p>
                <h2 id="h_count">0</h2>
            </div>

            <div class="stat-card">
                <p style="color:#f97316;">Employee</p>
                <h2 id="e_count">0</h2>
            </div>

            <div class="stat-card">
                <p style="color:#06b6d4;">Office</p>
                <h2 id="o_count">0</h2>
            </div>

        </div>

        <div class="survey-grid" style="margin-top:2rem;">

            <div class="stat-card">
                <h3>Survey Distribution</h3>
                <canvas id="pieChart"></canvas>
            </div>

            <div class="stat-card">
                <h3>Response Trends</h3>
                <canvas id="barChart"></canvas>
            </div>

        </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="css/js/analytics.js"></script>

</body>
</html>
